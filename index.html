        <div id="terminal-history"></div>
        <div id="terminal-prompt">
            <span style="color:green">root@maison</span>:<span style="color:cornflowerblue">/#</span>
            <input id="terminal-input" type="text" autofocus autocomplete="off" spellcheck="false">
        </div>

    </div>

    <script>
        const input = document.getElementById('terminal-input');
        const history = document.getElementById('terminal-history');
        const promptHTML = '<span style="color:green">root@maison</span>:<span style="color:cornflowerblue">/#</span>';

        function escapeHtml(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        const commands = {
            'ls': '-rw------- 1 simon simon  419 Jun  17  2025 key.secret<br>-rw-r--r-- 1 simon simon  109 Jun  17  2025 key.public',
            'cat key.secret': ';-)',
            'more key.secret': ';-)',
            'less key.secret': ';-)',
            'cat key.public':  'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPaEWY25qwOPJf/j8FYZ2ZerqGGnxkMoEp5OgADFI/sD',
            'more key.public': 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPaEWY25qwOPJf/j8FYZ2ZerqGGnxkMoEp5OgADFI/sD',
            'less key.public': 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPaEWY25qwOPJf/j8FYZ2ZerqGGnxkMoEp5OgADFI/sD',
        };

        function runCommand(cmd) {
            const trimmed = cmd.trim();
            if (trimmed === '') return null;
            if (trimmed in commands) return commands[trimmed];
            return 'error: command not available';
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const cmd = input.value;
                const line = document.createElement('div');
                line.innerHTML = promptHTML + ' ' + escapeHtml(cmd);
                history.appendChild(line);
                const output = runCommand(cmd);
                if (output !== null) {
                    const out = document.createElement('div');
                    out.innerHTML = output;
                    history.appendChild(out);
                }
                input.value = '';
            }
        });

        document.addEventListener('click', () => input.focus());
    </script>
